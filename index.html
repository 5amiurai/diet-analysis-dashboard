<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diet Analysis Dashboard - Phase 3</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --accent: #38bdf8; --text: #f1f5f9; --muted: #94a3b8; }
    body { background: var(--bg ); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
    
    /* Auth Overlay */
    #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; }
    .auth-card h2 { color: var(--accent); margin-bottom: 1.5rem; }
    .auth-card input { width: 100%; padding: 0.75rem; margin-bottom: 1rem; background: var(--bg); border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }
    .auth-card button { width: 100%; padding: 0.75rem; background: var(--accent); border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 0.5rem; }
    
    /* Dashboard Layout */
    #dashboardContent { display: none; }
    header { background: var(--surface); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
    .user-info { display: flex; align-items: center; gap: 1rem; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 0.4rem 0.8rem; border-radius: 4px; cursor: pointer; }
    
    main { padding: 2rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
    .card.wide { grid-column: 1 / -1; }
    
    /* Search & Table */
    .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; }
    th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: var(--accent); }
    .pagination { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }
  </style>
</head>
<body>

<!-- 1. AUTHENTICATION SCREEN -->
<div id="authOverlay">
  <div class="auth-card">
    <h2 id="authTitle">Login to Dashboard</h2>
    <input type="text" id="userName" placeholder="Full Name (for registration)" style="display:none;">
    <input type="email" id="authEmail" placeholder="Email">
    <input type="password" id="authPassword" placeholder="Password">
    <button onclick="handleAuth()" id="authBtn">Login</button>
    <p style="font-size: 0.8rem; color: var(--muted); text-align: center; cursor: pointer;" onclick="toggleAuthMode()" id="toggleText">Need an account? Register</p>
  </div>
</div>

<!-- 2. DASHBOARD CONTENT -->
<div id="dashboardContent">
  <header>
    <div>
      <h1 style="font-size: 1.2rem; margin: 0;">&#127869; Diet Analysis Pro</h1>
      <p style="font-size: 0.8rem; color: var(--muted); margin: 0;">Phase 3 - Performance & Security Optimized</p>
    </div>
    <div class="user-info">
      <span id="displayUserName">User</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Search & Interaction (Requirement 3.a.iii) -->
    <div class="card wide">
      <h2>&#128269; Recipe Search & Interaction</h2>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search recipes (e.g. chicken, salad)..." style="flex:1; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: white;">
        <select id="dietFilter" style="padding: 0.5rem; border-radius: 4px; background: var(--bg); color: white; border: 1px solid var(--border);">
          <option value="all">All Diets</option>
          <option value="keto">Keto</option>
          <option value="vegan">Vegan</option>
          <option value="mediterranean">Mediterranean</option>
        </select>
        <button onclick="searchRecipes(1)" style="padding: 0.5rem 1rem; background: var(--accent); border: none; border-radius: 4px; cursor: pointer;">Search</button>
      </div>
      <table id="recipeTable">
        <thead><tr><th>Recipe Name</th><th>Diet Type</th><th>Cuisine</th><th>Protein</th><th>Carbs</th></tr></thead>
        <tbody id="recipeBody"></tbody>
      </table>
      <div class="pagination">
        <button onclick="changePage(-1)" id="prevBtn">Previous</button>
        <span id="pageDisplay">Page 1</span>
        <button onclick="changePage(1)" id="nextBtn">Next</button>
      </div>
    </div>

    <!-- Charts (Requirement 3.a.ii - Loaded from Cache) -->
    <div class="card"><h2>Avg Macronutrients</h2><canvas id="barChart"></canvas></div>
    <div class="card"><h2>Recipe Distribution</h2><canvas id="pieChart"></canvas></div>
  </main>
</div>

<script>
  const API_BASE = "https://diet-analysis-fn-sr-e0dhdrheegddcadq.canadacentral-01.azurewebsites.net/api";
  let currentUser = null;
  let currentPage = 1;
  let authMode = 'login';

  // --- AUTH LOGIC ---
  function toggleAuthMode( ) {
    authMode = authMode === 'login' ? 'register' : 'login';
    document.getElementById('authTitle').innerText = authMode === 'login' ? 'Login' : 'Register';
    document.getElementById('authBtn').innerText = authMode === 'login' ? 'Login' : 'Register';
    document.getElementById('userName').style.display = authMode === 'login' ? 'none' : 'block';
    document.getElementById('toggleText').innerText = authMode === 'login' ? 'Need an account? Register' : 'Have an account? Login';
  }

  async function handleAuth() {
    const email = document.getElementById('authEmail').value;
    const password = document.getElementById('authPassword').value;
    const name = document.getElementById('userName').value;

    const res = await fetch(`${API_BASE}/auth`, {
      method: 'POST',
      body: JSON.stringify({ action: authMode, email, password, name })
    });

    if (res.ok) {
      const data = await res.json();
      if (authMode === 'login') {
        currentUser = data.user;
        document.getElementById('displayUserName').innerText = currentUser.name;
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
        loadDashboardData();
      } else {
        alert("Registration successful! Please login.");
        toggleAuthMode();
      }
    } else {
      alert("Authentication failed. Check your credentials.");
    }
  }

  function logout() { location.reload(); }

  // --- DATA LOGIC ---
  async function loadDashboardData() {
    const res = await fetch(`${API_BASE}/analyze`);
    const data = await res.json();
    renderCharts(data);
    searchRecipes(1);
  }

  async function searchRecipes(page) {
    currentPage = page;
    const search = document.getElementById('searchInput').value;
    const diet = document.getElementById('dietFilter').value;
    
    const res = await fetch(`${API_BASE}/analyze?search=${search}&diet=${diet}&page=${page}`);
    const recipes = await res.json();
    
    const body = document.getElementById('recipeBody');
    body.innerHTML = recipes.map(r => `
      <tr>
        <td>${r.Recipe_name}</td>
        <td>${r.Diet_type}</td>
        <td>${r.Cuisine_type}</td>
        <td>${r['Protein(g)']}g</td>
        <td>${r['Carbs(g)']}g</td>
      </tr>
    `).join('');
    
    document.getElementById('pageDisplay').innerText = `Page ${currentPage}`;
    document.getElementById('prevBtn').disabled = currentPage === 1;
  }

  function changePage(delta) { searchRecipes(currentPage + delta); }

  function renderCharts(data) {
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: data.avg_macros.map(m => m.Diet_type),
        datasets: [{ label: 'Protein (g)', data: data.avg_macros.map(m => m['Protein(g)']), backgroundColor: '#38bdf8' }]
      },
      options: { scales: { y: { beginAtZero: true } } }
    });

    new Chart(document.getElementById('pieChart'), {
      type: 'pie',
      data: {
        labels: data.recipe_counts.map(c => c.Diet_type),
        datasets: [{ data: data.recipe_counts.map(c => c.count), backgroundColor: ['#38bdf8', '#818cf8', '#34d399', '#fb923c'] }]
      }
    });
  }
</script>
</body>
</html>
